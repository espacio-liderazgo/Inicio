  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n/* latin */\n@font-face {\n  font-family: 'Work Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"08ed4e91-6ef8-4746-9150-07d2f333d58e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"f6fdf1a8-55f3-4cb5-a67d-747dab5704f8\"><\u002Fscript>\n  <style>\n    body{margin:0;background:#f7f2e8;}\n    a{color:#b5563a;text-decoration:none;}\n    a:hover{color:#8f4128;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Work Sans',sans-serif;color:#2b2620;background:#f7f2e8;\">\n\n  <!-- NAV -->\n  <header style=\"position:sticky;top:0;z-index:20;background:rgba(247,242,232,.92);backdrop-filter:blur(6px);border-bottom:1px solid #e4d9c4;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;\">\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;letter-spacing:.01em;\">Pablo Waldovino <span style=\"color:{{ accent }};\">·<\u002Fspan> Espacio de Liderazgo<\u002Fdiv>\n      <nav style=\"display:flex;gap:34px;align-items:center;font-size:15px;font-weight:500;\">\n        <a href=\"#sobre-mi\" style=\"color:#2b2620;\">Sobre mí<\u002Fa>\n        <a href=\"#acompano\" style=\"color:#2b2620;\">Cómo acompaño<\u002Fa>\n        <a href=\"#programas\" style=\"color:#2b2620;\">Programas<\u002Fa>\n        <a href=\"#libros\" style=\"color:#2b2620;\">Libros<\u002Fa>\n        <a href=\"https://wa.link/7aznxu\" style=\"background:{{ accent }};color:#fff;padding:10px 22px;border-radius:999px;font-weight:600;\" target=\"_blank\" rel=\"noopener noreferrer\">Agendar sesión<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:96px 32px 80px;display:grid;grid-template-columns:1.15fr .85fr;gap:64px;align-items:center;\">\n    <div>\n      <div style=\"font-size:14px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:{{ accent }};margin-bottom:22px;\">Coaching Ontológico · Liderazgo<\u002Fdiv>\n      <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.08;margin:0;\">Acompaño a personas y emprendedores a liderar su propio camino.<\u002Fh1>\n      <p style=\"font-size:19px;line-height:1.6;color:#4a4238;margin:28px 0 0;max-width:520px;\">Soy Técnico en Liderazgo y Coach Ontológico. Trabajo con quienes buscan tomar decisiones con más claridad, sostener sus proyectos y liderarse a sí mismos antes que a los demás.<\u002Fp>\n      <div style=\"display:flex;gap:18px;margin-top:40px;flex-wrap:wrap;\">\n        <a href=\"#contacto\" style=\"background:{{ accent }};color:#fff;padding:16px 30px;border-radius:999px;font-weight:600;font-size:16px;\">Agendar una sesión<\u002Fa>\n        <a href=\"https://instagram.com/Espacio.Liderazgo\" style=\"border:1.5px solid #d8c9a8;padding:16px 30px;border-radius:999px;font-weight:600;font-size:16px;color:#2b2620;\">@Espacio.Liderazgo<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <image-slot id=\"hero-photo\" shape=\"rounded\" radius=\"24\" placeholder=\"Foto de Pablo\" style=\"width:100%;height:520px;\"><\u002Fimage-slot>\n  <\u002Fsection>\n\n  <!-- SOBRE MI -->\n  <section id=\"sobre-mi\" style=\"max-width:1180px;margin:0 auto;padding:60px 32px 100px;display:grid;grid-template-columns:.8fr 1.2fr;gap:64px;align-items:center;\">\n    <image-slot id=\"sobre-mi-photo\" shape=\"rounded\" radius=\"24\" placeholder=\"Foto de Pablo\" style=\"width:100%;height:440px;\"><\u002Fimage-slot>\n    <div>\n      <div style=\"font-size:14px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:{{ accent }};margin-bottom:14px;\">Sobre mí<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:42px;margin:0 0 22px;line-height:1.15;\">Un espacio para pensar tu liderazgo, no solo tu productividad.<\u002Fh2>\n      <p style=\"font-size:18px;line-height:1.7;color:#4a4238;margin:0 0 16px;\">Mi nombre es Pablo Waldovino. Soy Técnico en Liderazgo y Coach Ontológico, y dedico mi trabajo a acompañar procesos de transformación personal y profesional.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.7;color:#4a4238;margin:0;\">Creo que liderar empieza puertas adentro: en cómo nos hablamos, cómo sostenemos nuestras decisiones y cómo nos vinculamos con quienes nos rodean. Desde ahí acompaño tanto a personas que buscan crecer como a emprendedores que están construyendo su proyecto.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COMO ACOMPAÑO -->\n  <section id=\"acompano\" style=\"background:#2b2620;padding:100px 32px;\">\n    <div style=\"max-width:1180px;margin:0 auto;color:#f7f2e8;\">\n      <div style=\"font-size:14px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:{{ accentLight }};margin-bottom:14px;\">Cómo acompaño<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:42px;margin:0 0 56px;max-width:640px;line-height:1.15;\">Un proceso de coaching pensado para generar movimiento real.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:36px;\">\n        <div>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:52px;color:{{ accentLight }};\">01<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:600;margin-top:10px;\">Escucha inicial<\u002Fdiv>\n          <div style=\"font-size:16px;color:#cabfa9;margin-top:10px;line-height:1.6;\">Conversamos sobre dónde estás parado y qué es lo que te trae a este espacio.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:52px;color:{{ accentLight }};\">02<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:600;margin-top:10px;\">Mirada ontológica<\u002Fdiv>\n          <div style=\"font-size:16px;color:#cabfa9;margin-top:10px;line-height:1.6;\">Exploramos creencias, lenguaje y emociones que sostienen tu forma de actuar.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:52px;color:{{ accentLight }};\">03<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:600;margin-top:10px;\">Diseño de acción<\u002Fdiv>\n          <div style=\"font-size:16px;color:#cabfa9;margin-top:10px;line-height:1.6;\">Definimos pasos concretos, coherentes con quién querés ser y hacia dónde vas.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:52px;color:{{ accentLight }};\">04<\u002Fdiv>\n          <div style=\"font-size:20px;font-weight:600;margin-top:10px;\">Sostén y seguimiento<\u002Fdiv>\n          <div style=\"font-size:16px;color:#cabfa9;margin-top:10px;line-height:1.6;\">Acompaño el proceso sesión a sesión, ajustando el camino a medida que avanzás.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROGRAMAS -->\n  <section id=\"programas\" style=\"max-width:1180px;margin:0 auto;padding:100px 32px;\">\n    <div style=\"font-size:14px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:{{ accent }};margin-bottom:14px;\">Programas<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:42px;margin:0 0 56px;line-height:1.15;max-width:640px;\">Dos caminos, un mismo trabajo de fondo: liderarte a vos mismo.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;\">\n      <div style=\"background:#fff;border-radius:24px;padding:44px;border:1px solid #e4d9c4;\">\n        <div style=\"font-size:15px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:{{ accent }};\">Para personas<\u002Fdiv>\n        <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin:14px 0 18px;\">Coaching de liderazgo personal<\u002Fh3>\n        <p style=\"font-size:17px;line-height:1.65;color:#4a4238;margin:0 0 24px;\">Sesiones individuales para quienes buscan mayor claridad, autoconocimiento y decisiones más alineadas con lo que quieren vivir.<\u002Fp>\n        <ul style=\"margin:0;padding:0 0 0 20px;color:#4a4238;font-size:16px;line-height:2;\">\n          <li>Sesiones individuales o grupales, presenciales u online<\u002Fli>\n          <li>Trabajo sobre creencias y hábitos<\u002Fli>\n          <li>Seguimiento entre sesiones<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:24px;padding:44px;border:1px solid #e4d9c4;\">\n        <div style=\"font-size:15px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:{{ accent }};\">Para emprendedores<\u002Fdiv>\n        <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin:14px 0 18px;\">Coaching para liderar tu proyecto<\u002Fh3>\n        <p style=\"font-size:17px;line-height:1.65;color:#4a4238;margin:0 0 24px;\">Acompañamiento para quienes están construyendo un emprendimiento y necesitan sostener el rumbo, la toma de decisiones y el liderazgo de equipo.<\u002Fp>\n        <ul style=\"margin:0;padding:0 0 0 20px;color:#4a4238;font-size:16px;line-height:2;\">\n          <li>Foco en decisiones y prioridades<\u002Fli>\n          <li>Liderazgo de equipos y vínculos<\u002Fli>\n          <li>Sesiones individuales o grupales, según el equipo<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- LIBROS -->\n  <sc-if value=\"{{ showBooks }}\" hint-placeholder-val=\"{{ true }}\">\n  <section id=\"libros\" style=\"background:#efe4cf;padding:100px 32px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"font-size:14px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:{{ accent }};margin-bottom:14px;\">Libros<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:42px;margin:0 0 56px;line-height:1.15;max-width:640px;\">Dos libros que resumen mi forma de pensar el cambio.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;\">\n        <div style=\"display:flex;gap:32px;align-items:flex-start;\">\n          <image-slot id=\"libro-rompe-el-pacto\" shape=\"rect\" placeholder=\"Tapa: Rompe el Pacto\" style=\"width:180px;height:270px;flex:none;box-shadow:0 18px 34px -18px rgba(43,38,32,.4);\"><\u002Fimage-slot>\n          <div>\n            <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;margin:0 0 10px;\">Rompe el Pacto<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4a4238;margin:0;\">Un recorrido sobre los acuerdos invisibles que nos atan a formas de vivir que ya no elegimos, y cómo animarse a romperlos.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:32px;align-items:flex-start;\">\n          <image-slot id=\"libro-imparable\" shape=\"rect\" placeholder=\"Tapa: Imparable\" style=\"width:180px;height:270px;flex:none;box-shadow:0 18px 34px -18px rgba(43,38,32,.4);\"><\u002Fimage-slot>\n          <div>\n            <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;margin:0 0 10px;\">Imparable<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4a4238;margin:0;\">Herramientas concretas para sostener el impulso de un proyecto o un cambio personal, incluso cuando el entorno no acompaña.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- TESTIMONIOS -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:100px 32px;\">\n    <div style=\"font-size:14px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:{{ accent }};margin-bottom:14px;\">Testimonios<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:42px;margin:0 0 56px;line-height:1.15;max-width:640px;\">Lo que dicen quienes ya recorrieron el proceso.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;\">\n      <div style=\"background:#fff;border-radius:20px;padding:36px;border:1px solid #e4d9c4;\">\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:44px;color:{{ accent }};line-height:1;\">\"<\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.65;color:#4a4238;margin:6px 0 24px;\">Gracias por tus palabras justas, por ayudarme a reencontrarme conmigo y por tu energía. Conectar con vos es un pacer!!!<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <image-slot id=\"testimonio-1-foto\" shape=\"circle\" placeholder=\"Foto\" style=\"width:48px;height:48px;\" src=\"729bbf5c-dae5-4a08-8045-14e0a94c2fe9\"><\u002Fimage-slot>\n          <div><div style=\"font-weight:600;font-size:15px;\">Andrea R<\u002Fdiv><div style=\"font-size:13px;color:#8a7f6b;\">Sesión individual<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:20px;padding:36px;border:1px solid #e4d9c4;\">\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:44px;color:{{ accent }};line-height:1;\">\"<\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.65;color:#4a4238;margin:6px 0 24px;\">Muchas gracias por tu tiempo, por el respeto en los silencios y la seriedad del espacio. En cada encuentro salgo pensando en mil cosas.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <image-slot id=\"testimonio-2-foto\" shape=\"circle\" placeholder=\"Foto\" style=\"width:48px;height:48px;\" src=\"620cdf60-2d64-4637-b1e3-88d97874fa97\"><\u002Fimage-slot>\n          <div><div style=\"font-weight:600;font-size:15px;\">Nicolás M<\u002Fdiv><div style=\"font-size:13px;color:#8a7f6b;\">Sesión grupal<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:20px;padding:36px;border:1px solid #e4d9c4;\">\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:44px;color:{{ accent }};line-height:1;\">\"<\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.65;color:#4a4238;margin:6px 0 24px;\">No te imaginas cuanto bien me hacen nuestros encuentros, tu escucha, tus preguntas, tu acompañamiento. De verdad muchas gracias.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <image-slot id=\"testimonio-3-foto\" shape=\"circle\" placeholder=\"Foto\" style=\"width:48px;height:48px;\" src=\"9a56e6d6-4e4f-4b28-a395-9d7ce4ad81b7\"><\u002Fimage-slot>\n          <div><div style=\"font-weight:600;font-size:15px;\">Cecilia B<\u002Fdiv><div style=\"font-size:13px;color:#8a7f6b;\">Sesión grupal<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACTO -->\n  <section id=\"contacto\" style=\"background:{{ accent }};padding:100px 32px;\">\n    <div style=\"max-width:780px;margin:0 auto;text-align:center;\">\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:48px;color:#fff;margin:0 0 20px;line-height:1.15;\">¿Listo para liderar tu próximo paso?<\u002Fh2>\n      <p style=\"font-size:19px;color:#ffe9dd;line-height:1.6;margin:0 0 40px;\">Agendá una sesión inicial y conversemos sobre dónde estás y hacia dónde querés ir.<\u002Fp>\n      <div style=\"display:flex;gap:18px;justify-content:center;flex-wrap:wrap;\">\n        <a href=\"https://wa.link/7aznxu\" style=\"background:#fff;color:{{ accent }};padding:16px 34px;border-radius:999px;font-weight:700;font-size:16px;\" target=\"_blank\" rel=\"noopener noreferrer\">Agendar una sesión<\u002Fa>\n        <a href=\"https://instagram.com/Espacio.Liderazgo\" style=\"border:1.5px solid #fff;color:#fff;padding:16px 34px;border-radius:999px;font-weight:700;font-size:16px;\">@Espacio.Liderazgo<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"padding:44px 32px;text-align:center;font-size:14px;color:#8a7f6b;\">\n    Pablo Waldovino — Espacio de Liderazgo · Técnico en Liderazgo y Coach Ontológico\n  <\u002Ffooter>\n<\u002Fdiv>\n\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#6e4b3b&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#b5563a&quot;,&quot;#8a6d3b&quot;,&quot;#3b5a6e&quot;,&quot;#6e4b3b&quot;]},&quot;showBooks&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const accent = this.props.accentColor ?? '#6e4b3b';\n    return {\n      accent,\n      accentLight: this.props.accentColor ?? '#a98567',\n      showBooks: this.props.showBooks ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
